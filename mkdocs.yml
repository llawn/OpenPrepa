site_name: OpenPrepa
site_url: https://llawn.github.io/OpenPrepa/
repo_url: https://github.com/llawn/OpenPrepa
theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight
plugins:
  - search
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/llawn/OpenPrepa
use_directory_urls: true
nav:
  - Accueil: index.md
  - X-ENS:
    - 2021:
      - Mathématiques A: pdfs/X-ENS/2021/mathsA.pdf
